# Conda environment for OrbitSight on rolf (or any CUDA box).
# Create with:  conda env create -f environment.yml  &&  conda activate orbitsight
# NOTE: rolf runs CUDA 11.3.  If the pinned pytorch below fails, install it
# per the group guide instead:
#   conda install pytorch pytorch-cuda=11.8 torchvision -c pytorch -c nvidia
name: orbitsight
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pytorch>=2.1
  - pytorch-cuda=11.8        # rolf: use 11.3/11.8 per `nvidia-smi`; CPU-only -> drop this line
  - numpy>=1.26
  - scipy>=1.11
  - scikit-learn>=1.3
  - pandas>=2.0
  - joblib>=1.3
  - openpyxl>=3.1
  - tabulate>=0.9
  - pillow>=10.0
  - tqdm>=4.66
  - pip
  - pip:
      - lightgbm>=4.1
      - plotly>=5.18
